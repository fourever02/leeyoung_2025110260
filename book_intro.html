<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME - 빈티지 다이어리 & 귀여운 친구들</title>
    <style>
        /* 기본 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background-color: #fdfaf5; color: #333; overflow-x: hidden; }
        
        /* [1] 메인 페이지 (전체 화면 배경 및 중앙 집중 배치) */
        .hero { 
            height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            color: white; text-align: center;
            transition: height 0.5s ease;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero-content h1 { 
            font-size: 5rem; letter-spacing: 8px; font-family: 'Georgia', serif; margin-bottom: 30px;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.6);
        }

        /* 메뉴 중앙 정렬 스타일 */
        .hero-nav { 
            list-style: none; 
            display: flex; 
            gap: 50px;
            padding: 0;
            justify-content: center;
        }
        
        .hero-nav li a { 
            text-decoration: none; color: white; font-weight: 500; font-size: 1.3rem; 
            padding-bottom: 8px; border-bottom: 2px solid transparent; transition: 0.3s; opacity: 0.8;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .hero-nav li a:hover { opacity: 1; border-bottom: 2px solid white; }

        /* [2] 섹션 스타일 (기본 숨김) */
        .content-section { 
            display: none; 
            padding: 100px 10%; background-color: #fdfaf5; min-height: 600px;
            animation: fadeIn 0.8s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 60px; color: #5d4037; font-family: 'Georgia', serif; }

        /* 캐릭터 카드 디자인 - 산리오/토이스토리 친구들 */
        .character-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .char-card { 
            background: white; padding: 40px; border-radius: 20px; text-align: center; 
            border: 1px solid #efebe9; box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
            transition: 0.3s ease;
        }
        .char-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(141, 110, 99, 0.1); }
        
        .char-img { 
            width: 150px; height: 150px; border-radius: 50%; 
            margin: 0 auto 25px; border: 6px solid #fdfaf5; 
            background-size: contain; /* 이미지가 잘리지 않고 전체가 보이도록 수정 */
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .char-name { font-size: 1.8rem; color: #795548; margin-bottom: 10px; font-family: 'Georgia', serif; }
        .char-series { font-size: 1rem; color: #a1887f; margin-bottom: 15px; font-weight: bold; }
        .char-desc { font-size: 1rem; color: #6d4c41; line-height: 1.7; }

        /* 책 소개 디자인 (기존 유지) */
        .book-box { display: flex; gap: 60px; background: white; padding: 60px; border-radius: 15px; align-items: center; border: 1px solid #efebe9; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
        .book-img { width: 280px; border-radius: 5px; box-shadow: 10px 10px 25px rgba(0,0,0,0.1); }
        .book-text h3 { font-size: 2.4rem; margin-bottom: 25px; color: #5d4037; }
        .buy-btn { display: inline-block; padding: 15px 40px; background: #8d6e63; color: white; text-decoration: none; border-radius: 30px; margin-top: 25px; font-weight: bold; }

        footer { text-align: center; padding: 50px; background: #3e2723; color: #d7ccc8; }

        @media (max-width: 992px) {
            .char-card { padding: 30px; }
            .hero-content h1 { font-size: 3.5rem; }
        }
        @media (max-width: 768px) {
            .hero-nav { gap: 20px; flex-wrap: wrap; justify-content: center; }
            .book-box { flex-direction: column; text-align: center; padding: 40px; }
        }
    </style>
</head>
<body>

            <ul class="hero-nav">
                <li><a onclick="showSection('home')">Home</a></li>
                <li><a onclick="showSection('characters')">캐릭터</a></li>
                <li><a onclick="showSection('book')">책소개</a></li>
            </ul>
        </div>
    </header>
